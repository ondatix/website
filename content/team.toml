[[member]]
name = "Dr. Jacob Beck"
email = "jacob.beck@ondatix.org"
image = "/images/team/jacob_beck_1_1_format.jpg"
description = "Jacob Beck promovierte bis Herbst 2025 am Social Data Science and AI Lab (SODA) der LMU. Seine Forschung konzentrierte sich auf Datenqualität in der Entwicklung von KI-Modellen, auf effektive Mensch-KI-Kollaboration sowie auf das Brückenbauen zwischen Sozialwissenschaft und Künstlicher Intelligenz. Nachdem er 2021 selbst Stipendiat an der University of Warwick war, gründete und leitete er 2023 und 2024 das Data Science for Social Good-Programm am Munich Center for Machine Learning mit. Dort betreute er Projekte von Stipendiat:innen, die gemeinsam mit gemeinnützigen und öffentlichen Organisationen an datenbasierten Lösungen für die konkreten Herausforderungen dieser Partner arbeiteten. Auch bei ADA liegt sein Fokus auf der Übersetzungsarbeit zwischen technischer und fachlicher Perspektive, und darauf, Problemstellungen und Lösungsansätze gemeinsam klar zu definieren."
social = [
  { title = "LMU-Profil", url = "https://www.stat.lmu.de/soda/en/team/contact-page/jacob-beck-c1c60091.html" }
]

[[member]]
name = "Leonhard Kestel"
email = "leo.kestel@ondatix.org"
image = "/images/team/leokestel_1_1_format_m.jpg"
description = "Leo ist Softwareentwickler und Data Scientist. Neben ondatix promoviert er am Social Data Science and AI (SODA) Lab an der Ludwig-Maximilians-Universität München. Dort beschäftigt er sich mit Neurosymbolischen Methoden für Vertrauenswürdige KI. Fairness und Erklärbarkeit von automatisierten Entscheidungen sind dabei wichtige Aspekte seiner Forschung. Im ADA Projekt arbeitet er mit Mitarbeitenden aus der öffentlichen Verwaltung zusammen, um gemeinsam an einem sinnvollen Umgang mit Daten im Behördenkontext."
