<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ADA Gleichstellungskonzepte</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #fffbf3;
      margin: 0;
      padding: 0;
      color: #333;
    }
    .container {
      max-width: 21cm;
      margin: 40px auto;
      background: #fffbf3;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.1);
      border: 3px solid #b6a6f6;
    }
    h1 {
      text-align: center;
      color: #232528;
      font-size: 2rem;
      margin-bottom: 30px;
    }
    label {
      display: block;
      font-weight: bold;
      margin-top: 20px;
      color: #4d57b9;
    }
    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border-radius: 8px;
      border: 2px solid #b6a6f6;
      background: #fffbf3;
      font-size: 1rem;
    }
    button {
      margin-top: 30px;
      width: 100%;
      padding: 14px;
      font-size: 1.1rem;
      background: #ff7550;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover {
      background: #cfff63;
      color: #333;
    }
    
    /* Blockquote styling for definition boxes */
    #preview blockquote {
      background-color: #e8e8e8;
      border-left: 4px solid #999999;
      margin: 15px 0;
      padding: 12px 15px;
      border-radius: 4px;
      font-style: normal;
    }
    
    #preview blockquote p {
      margin: 8px 0;
      padding: 0;
    }
    
    #preview blockquote strong {
      color: #333;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>ADA Gleichstellungskonzepte</h1>
    <label for="fileInput">Parameter 1: Pfad zur CSV-Datei</label>
    <input type="file" id="fileInput" accept=".csv" />

    <label for="yearInput">Parameter 2: Erhebungsjahr</label>
    <input type="number" id="yearInput" placeholder="z.B. 2024" />

    <label for="paletteInput">Parameter 3: Farbpalette</label>
    <select id="paletteInput">
      <option value="palette1">Palette 1 (barrierefrei)</option>
      <option value="palette2">Palette 2 (barrierefrei)</option>
      <option value="palette3">Palette 3 (barrierefrei)</option>
    </select>

    <label for="nInput">Parameter 4: Kleinste N</label>
    <input type="number" id="nInput" placeholder="z.B. 10" />

    <label for="agencyInput">Parameter 5: Name der Institution</label>
    <input type="text" id="agencyInput" placeholder="Name der Institution" />

    <label for="mdInput">Markdown-Report-Vorlage hochladen</label>
    <input type="file" id="mdInput" accept=".md" />

    <button id="previewBtn">Vorschau erzeugen</button>

    <div id="preview" style="margin-top:30px; padding:0px; background:#fffbf3; border:0px solid #cfff63; border-radius:12px; display:none;"></div>

    <button id="exportDocxBtn" style="display:none;">Als DOCX exportieren</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docx@8.0.0/build/index.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/js-yaml/dist/js-yaml.min.js"></script>


  <script src="js/external/marked.min.js"></script>
  <script src="js/external/index.min.js"></script>
  <script src="js/external/chart.js"></script>
  <script src="js/external/chartjs-plugin-datalabels@2"></script>
  <script src="js/external/js-yaml.min.js"></script>

  <!-- Modular Application Scripts -->
  <script src="js/dataManager.js"></script>
  <script src="js/dataProcessor.js"></script>
  <script src="js/chartProcessor.js"></script>
  <script src="js/textFormatter.js"></script>
  <script src="js/listProcessor.js"></script>
  <script src="js/elementProcessor.js"></script>
  <script src="js/documentBuilder.js"></script>
  <script src="js/uiController.js"></script>
</body>
</html>
